# name: Ansible Provision
# author: Rafael Ito / Gemini
# based on: Hachiko theme by Mert18 (used in root.conf)

# change default BG & FG colors
foreground  #FF0055
background  #280000

# Cursor colors
cursor                          #FF7979
cursor_text_color               #111111

# Color Schemes
active_tab_foreground   #FFFAFA
active_tab_background   #B1003C
active_tab_font_style   bold
inactive_tab_foreground #B1003C
inactive_tab_background #FFFAFA
tab_bar_margin_color            none

mark1_foreground #FFFAFA
mark1_background #870300

active_border_color             #FFFAFA
inactive_border_color           #870300
bell_border_color               #870300
visual_bell_color               none

selection_foreground #FFFAFA
selection_background #870300

url_color #FF7979

# Black / Gray
color0  #181818
color8  #333333

# Red (Ansible: Failed / Error)
# Brightened slightly to stand out against the #280000 background
color1  #FF4444
color9  #FF6666

# Green (Ansible: OK)
# Using a bright, high-contrast mint green so it doesn't clash with the red background
color2  #50FA7B
color10 #73FCA3

# Yellow / Orange (Ansible: Changed)
# Kept in the orange family for warmth, but distinct enough from the red text
color3  #FFB86C
color11 #FFD19D

# Blue (General formatting)
color4  #82AAFF
color12 #A1C4FF

# Magenta (Ansible: WARNING)
# A vibrant pinkish-purple
color5  #C792EA
color13 #E0B7FF

# Cyan (Ansible: Skipping & TASK titles)
# A bright cyan to clearly demarcate new tasks and skipped steps
color6  #8BE9FD
color14 #A4FFFF

# White (General text / Ansible formatting)
# Retaining Hachiko's original soft whites
color7  #FFDAF1
color15 #FFE6DA